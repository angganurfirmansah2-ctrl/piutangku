<style>
:root{--bg-app:#f7fbff;--surface:#fff;--surface-2:#eef6ff;--primary:#2563eb;--primary-2:#0ea5e9;--text-primary:#0f172a;--text-secondary:#64748b;--border:#dbeafe;--green:#16a34a;--orange:#f97316;--red:#ef4444;--shadow-lg:0 24px 80px rgba(15,23,42,.35);--radius:22px}*{box-sizing:border-box}body{background:radial-gradient(circle at top left,#1d4ed8 0,#0f172a 35%,#020617 100%);color:var(--text-primary);margin:0;padding:0;overflow-x:hidden;font-family:'Inter',system-ui,sans-serif}#app{display:flex;justify-content:center;align-items:center;min-height:100vh;width:100%}.app-container{aspect-ratio:10/21;height:min(915px,calc(100vh - 40px));max-width:440px;background-color:var(--bg-app);box-shadow:var(--shadow-lg),0 0 0 12px #1E293B;border-radius:40px;position:relative;overflow:hidden;display:flex;flex-direction:column;transform:translate(0,0)}.app-notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:30px;background-color:#1E293B;border-radius:15px;z-index:1000;display:flex;align-items:center;justify-content:center}.app-notch::after{content:'';width:12px;height:12px;background-color:#0F172A;border-radius:50%;margin-left:50px}.phone-status-bar{position:absolute;top:0;left:0;right:0;z-index:999;display:flex;justify-content:flex-start;align-items:center;padding:4px 24px 0;height:22px;background-color:var(--bg-app);border-top-left-radius:40px;border-top-right-radius:40px;pointer-events:none}.status-bar-time{font-size:.65rem;font-weight:800;color:#64748B;letter-spacing:.5px}.app-body{flex:1;width:100%;height:100%;overflow-y:auto;padding-top:24px;background:linear-gradient(180deg,#f8fbff 0%,#eef6ff 100%)}
ion-app{background:transparent}.screen{min-height:100%;padding:18px 18px 96px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 0 18px}.brand{display:flex;gap:10px;align-items:center}.logo{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:grid;place-items:center;color:white;font-weight:900;box-shadow:0 10px 24px rgba(37,99,235,.25)}h1,h2,h3,p{margin:0}.muted{color:var(--text-secondary)}.card{background:rgba(255,255,255,.88);border:1px solid rgba(219,234,254,.9);border-radius:var(--radius);padding:16px;box-shadow:0 8px 28px rgba(37,99,235,.08);backdrop-filter:blur(12px)}.login-hero{padding:34px 0 18px;text-align:center}.login-hero .logo{margin:auto;width:72px;height:72px;border-radius:24px;font-size:28px}.input{width:100%;border:1px solid var(--border);background:#fff;border-radius:15px;padding:13px 14px;font:inherit;outline:none}.input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.10)}label{display:block;font-size:12px;font-weight:700;color:#475569;margin:12px 0 7px}.btn{border:0;border-radius:16px;padding:13px 16px;font-weight:800;font:inherit;cursor:pointer;min-height:44px}.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:white;box-shadow:0 12px 24px rgba(37,99,235,.22)}.btn-soft{background:#eaf3ff;color:#1d4ed8}.btn-danger{background:#fee2e2;color:#b91c1c}.btn-row{display:flex;gap:10px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.metric{padding:14px;border-radius:18px;background:linear-gradient(180deg,#fff,#f8fbff);border:1px solid var(--border)}.metric b{display:block;font-size:20px;margin-top:6px}.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:99px;font-size:12px;font-weight:800;background:#e0f2fe;color:#0369a1}.chip.green{background:#dcfce7;color:#166534}.chip.orange{background:#ffedd5;color:#9a3412}.chip.red{background:#fee2e2;color:#991b1b}.list{display:flex;flex-direction:column;gap:10px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;border-radius:16px;background:#fff;border:1px solid var(--border)}.row-main{min-width:0}.row-title{font-weight:800}.row-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}.tabs{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px 10px;z-index:900;backdrop-filter:blur(18px)}.tab{border:0;background:transparent;color:#64748b;font-size:10px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 2px;border-radius:14px}.tab.active{background:#eaf3ff;color:var(--primary)}.tab span:first-child{font-size:18px}.section-title{font-size:18px;font-weight:900;margin:18px 0 10px}.fab{position:fixed;right:calc(50% - 198px);bottom:86px;width:54px;height:54px;border-radius:18px}.modal{position:absolute;inset:0;background:rgba(15,23,42,.36);z-index:1200;display:grid;place-items:end center;padding:16px}.sheet{width:100%;background:#fff;border-radius:28px 28px 22px 22px;padding:18px;max-height:86%;overflow:auto}.toast{position:absolute;left:16px;right:16px;top:48px;z-index:1300;background:#0f172a;color:white;border-radius:16px;padding:12px 14px;font-size:13px;box-shadow:0 20px 45px rgba(15,23,42,.25)}.report-preview{background:white;border:1px solid var(--border);border-radius:18px;padding:14px;font-size:12px;line-height:1.55}.analysis{font-size:12px;line-height:1.55}.hide{display:none!important}@media(max-width:500px){body{background:var(--bg-app)}#app{min-height:100vh;min-height:100dvh;align-items:flex-start;justify-content:flex-start}.app-container{max-width:100%!important;width:100%!important;max-height:none!important;height:100vh!important;height:100dvh!important;aspect-ratio:unset!important;border-radius:0!important;box-shadow:none!important;padding-top:env(safe-area-inset-top,0px)}.app-notch,.phone-status-bar{display:none!important}.app-body{padding-top:8px!important}.fab{right:18px}}@media print{body{background:white}#app{display:block}.app-container{height:auto;max-width:none;box-shadow:none;border-radius:0}.tabs,.app-notch,.phone-status-bar,.no-print{display:none!important}.screen{padding:20px}.app-body{overflow:visible}}
</style>
</head><body><div id="app"><div class="app-container"><div class="app-notch"></div><div class="phone-status-bar"><span class="status-bar-time" id="clock">12.00</span></div><main class="app-body"><ion-app><div id="root"></div></ion-app></main></div></div>
<script>
const App=(()=>{let SQL,db,usingFallback=false,currentUser=null,route=location.hash.replace('#/','')||'login',chart=null;const root=document.getElementById('root'),clock=document.getElementById('clock');setInterval(()=>clock.textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),1000);const roles={admin:['dashboard','users','customers','receivables','payments','reports','settings'],sales:['dashboard','customers','receivables','settings'],finance:['dashboard','receivables','payments','reports','settings'],manager:['dashboard','receivables','payments','reports','settings'],owner:['dashboard','reports','settings']};const roleName={admin:'Admin',sales:'Staf Penjualan',finance:'Staf Keuangan',manager:'Manajer Keuangan',owner:'Pemilik Perusahaan'};const fmt=n=>'Rp '+Number(n||0).toLocaleString('id-ID');const today=()=>new Date().toISOString().slice(0,10);function exec(sql,params=[]){db.run(sql,params);persist()}function query(sql,params=[]){const r=db.exec(sql,params)[0];return r?r.values.map(v=>Object.fromEntries(r.columns.map((c,i)=>[c,v[i]]))):[]}async function persist(){try{const data=db.export();await idbSet('piutangku-db',data)}catch(e){try{localStorage.setItem('piutangku-db-b64',btoa(String.fromCharCode(...db.export())))}catch(_){}}}function idbSet(k,v){return new Promise((res,rej)=>{const o=indexedDB.open('PiutangKuLocal',1);o.onupgradeneeded=()=>o.result.createObjectStore('kv');o.onerror=()=>rej(o.error);o.onsuccess=()=>{const tx=o.result.transaction('kv','readwrite');tx.objectStore('kv').put(v,k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)}})}function idbGet(k){return new Promise((res,rej)=>{const o=indexedDB.open('PiutangKuLocal',1);o.onupgradeneeded=()=>o.result.createObjectStore('kv');o.onerror=()=>rej(o.error);o.onsuccess=()=>{const tx=o.result.transaction('kv','readonly'),rq=tx.objectStore('kv').get(k);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error)}})}async function boot(){try{SQL=await initSqlJs({locateFile:function(f){return "https:"+"//cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/"+f}});const saved=await idbGet('piutangku-db');db=saved?new SQL.Database(new Uint8Array(saved)):new SQL.Database();schema();seed();await persist()}catch(e){usingFallback=true;SQL=await initSqlJs({locateFile:function(f){return "https:"+"//cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/"+f}});db=new SQL.Database();schema();seed();toast('Mode sementara aktif. Data mungkin tidak tersimpan permanen.')}render()}function schema(){db.run(`PRAGMA foreign_keys=ON;CREATE TABLE IF NOT EXISTS profiles(id INTEGER PRIMARY KEY AUTOINCREMENT,full_name TEXT NOT NULL,email TEXT UNIQUE NOT NULL,password TEXT NOT NULL,role TEXT NOT NULL,status TEXT DEFAULT 'active',created_at TEXT DEFAULT CURRENT_TIMESTAMP);CREATE TABLE IF NOT EXISTS customers(id INTEGER PRIMARY KEY AUTOINCREMENT,name TEXT NOT NULL,phone TEXT,email TEXT,address TEXT,created_by INTEGER,created_at TEXT DEFAULT CURRENT_TIMESTAMP,FOREIGN KEY(created_by) REFERENCES profiles(id));CREATE TABLE IF NOT EXISTS receivables(id INTEGER PRIMARY KEY AUTOINCREMENT,customer_id INTEGER NOT NULL,invoice_no TEXT UNIQUE NOT NULL,transaction_date TEXT NOT NULL,amount REAL NOT NULL,paid_amount REAL DEFAULT 0,remaining_amount REAL DEFAULT 0,due_date TEXT NOT NULL,status TEXT DEFAULT 'unpaid',created_by INTEGER,created_at TEXT DEFAULT CURRENT_TIMESTAMP,FOREIGN KEY(customer_id) REFERENCES customers(id),FOREIGN KEY(created_by) REFERENCES profiles(id));CREATE TABLE IF NOT EXISTS payments(id INTEGER PRIMARY KEY AUTOINCREMENT,receivable_id INTEGER NOT NULL,payment_date TEXT NOT NULL,amount REAL NOT NULL,method TEXT,note TEXT,created_by INTEGER,created_at TEXT DEFAULT CURRENT_TIMESTAMP,FOREIGN KEY(receivable_id) REFERENCES receivables(id),FOREIGN KEY(created_by) REFERENCES profiles(id));CREATE TABLE IF NOT EXISTS reports(id INTEGER PRIMARY KEY AUTOINCREMENT,report_no TEXT UNIQUE,report_type TEXT,period_start TEXT,period_end TEXT,created_by INTEGER,status TEXT DEFAULT 'generated',pdf_content TEXT,created_at TEXT DEFAULT CURRENT_TIMESTAMP,FOREIGN KEY(created_by) REFERENCES profiles(id));CREATE TRIGGER IF NOT EXISTS trg_receivable_insert AFTER INSERT ON receivables BEGIN UPDATE receivables SET remaining_amount=NEW.amount-NEW.paid_amount,status=CASE WHEN NEW.amount-NEW.paid_amount<=0 THEN 'paid' ELSE 'unpaid' END WHERE id=NEW.id;END;CREATE TRIGGER IF NOT EXISTS trg_payment_insert AFTER INSERT ON payments BEGIN UPDATE receivables SET paid_amount=(SELECT COALESCE(SUM(amount),0) FROM payments WHERE receivable_id=NEW.receivable_id),remaining_amount=amount-(SELECT COALESCE(SUM(amount),0) FROM payments WHERE receivable_id=NEW.receivable_id),status=CASE WHEN amount-(SELECT COALESCE(SUM(amount),0) FROM payments WHERE receivable_id=NEW.receivable_id)<=0 THEN 'paid' ELSE 'unpaid' END WHERE id=NEW.receivable_id;END;`)}function seed(){if(query('SELECT COUNT(*) c FROM profiles')[0].c)return;[['Andi Pratama','admin@piutangku.local','admin123','admin'],['Rina Oktaviani','sales@piutangku.local','sales123','sales'],['Siti Rahmawati','keuangan@piutangku.local','keuangan123','finance'],['Dedi Kurniawan','manager@piutangku.local','manager123','manager'],['Budi Santoso','owner@piutangku.local','owner123','owner']].forEach(u=>db.run('INSERT INTO profiles(full_name,email,password,role) VALUES(?,?,?,?)',u));[['PT Sumber Makmur','081234567001','finance@sumber.co.id','Jakarta'],['CV Maju Jaya','081234567002','admin@maju.id','Bandung'],['Toko Berkah Abadi','081234567003','halo@berkah.id','Surabaya']].forEach(c=>db.run('INSERT INTO customers(name,phone,email,address,created_by) VALUES(?,?,?,?,2)',c));db.run("INSERT INTO receivables(customer_id,invoice_no,transaction_date,amount,due_date,created_by) VALUES (1,'INV-2026-001','2026-07-01',12500000,'2026-07-20',2),(2,'INV-2026-002','2026-07-03',8200000,'2026-07-14',2),(3,'INV-2026-003','2026-07-07',4600000,'2026-08-01',2)");db.run("INSERT INTO payments(receivable_id,payment_date,amount,method,note,created_by) VALUES(1,'2026-07-09',2500000,'Transfer','DP awal',3)")}function login(e){e.preventDefault();const email=val('email'),pass=val('password');if(!email||!pass){toast('Email dan password harus diisi');return}const u=query('SELECT * FROM profiles WHERE email=? AND password=? AND status="active"',[email,pass])[0];if(!u)return toast('Email atau password salah.');currentUser=u;route='dashboard';location.hash='/dashboard';render()}function logout(){currentUser=null;route='login';location.hash='/login';render()}function val(id){return document.getElementById(id)?.value||''}function toast(t){let d=document.createElement('div');d.className='toast';d.textContent=t;document.querySelector('.app-container').appendChild(d);setTimeout(()=>d.remove(),3200)}function nav(r){route=r;location.hash='/'+r;render()}window.addEventListener('hashchange',()=>{route=location.hash.replace('#/','')||'login';render()});function layout(title,content){const menu=roles[currentUser.role];return `<div class="screen"><div class="topbar"><div class="brand"><div class="logo">P</div><div><h2>${title}</h2><p class="muted">${currentUser.full_name} · ${roleName[currentUser.role]}</p></div></div><button class="btn btn-soft no-print" onclick="App.logout()">Keluar</button></div>${content}</div><div class="tabs no-print">${menu.map(m=>`<button class="tab ${route==m?'active':''}" onclick="App.nav('${m}')"><span>${icon(m)}</span><span>${label(m)}</span></button>`).join('')}</div>`}function icon(m){return{dashboard:'📊',users:'👥',customers:'🏢',receivables:'🧾',payments:'💳',reports:'📄',settings:'⚙️'}[m]}function label(m){return{dashboard:'Beranda',users:'User',customers:'Pelanggan',receivables:'Piutang',payments:'Bayar',reports:'Laporan',settings:'Atur'}[m]}function stats(){return query(`SELECT (SELECT COUNT(*) FROM customers) customers,(SELECT COUNT(*) FROM receivables) trx,(SELECT COALESCE(SUM(amount),0) FROM receivables) total,(SELECT COALESCE(SUM(remaining_amount),0) FROM receivables) remaining,(SELECT COUNT(*) FROM receivables WHERE status='unpaid' AND due_date<date('now')) overdue,(SELECT COALESCE(SUM(amount),0) FROM payments) paid`)[0]}function render(){if(!db)return;if(!currentUser&&route!=='login'){route='login'}if(route==='login'){root.innerHTML=`<div class="screen"><div class="login-hero"><div class="logo">P</div><h1>PiutangKu</h1><p class="muted">Sistem manajemen piutang local-first</p></div><form class="card" onsubmit="App.login(event)"><label>Email</label><input id="email" class="input" value="admin@piutangku.local"><label>Password</label><input id="password" type="password" class="input" value="admin123"><button class="btn btn-primary" style="width:100%;margin-top:16px">Masuk</button><p class="muted" style="font-size:12px;margin-top:12px">Akun: admin/sales/keuangan/manager/owner @piutangku.local</p></form><div class="card analysis" style="margin-top:14px"><b>Analisis RBAC:</b> Admin mengelola sistem, Sales mengelola pelanggan & transaksi, Keuangan mencatat pembayaran, Manajer membuat laporan PDF, Owner hanya melihat laporan.</div></div>`;return}if(!roles[currentUser.role].includes(route))route='dashboard';root.innerHTML=layout(label(route),views[route]());if(route==='dashboard')setTimeout(drawChart,50)}const views={dashboard(){const s=stats();return `<div class="grid"><div class="metric"><span class="muted">Total Piutang</span><b>${fmt(s.total)}</b></div><div class="metric"><span class="muted">Sisa Piutang</span><b>${fmt(s.remaining)}</b></div><div class="metric"><span class="muted">Pelanggan</span><b>${s.customers}</b></div><div class="metric"><span class="muted">Jatuh Tempo</span><b>${s.overdue}</b></div></div><div class="section-title">Grafik Piutang</div><div class="card"><canvas id="chart" height="190"></canvas></div><div class="section-title">Transaksi Terbaru</div><div class="list">${receivableRows().slice(0,5).map(rowHtml).join('')}</div>`},users(){return `<div class="card"><h3>Tambah Pengguna</h3>${formUser()}</div><div class="section-title">Daftar Pengguna</div><div class="list">${query('SELECT * FROM profiles ORDER BY id').map(u=>`<div class="row"><div><div class="row-title">${u.full_name}</div><div class="row-sub">${u.email} · ${roleName[u.role]}</div></div><span class="chip green">${u.status}</span></div>`).join('')}</div>`},customers(){return `<div class="card"><h3>Tambah Pelanggan</h3>${formCustomer()}</div><div class="section-title">Data Pelanggan</div><div class="list">${query('SELECT * FROM customers ORDER BY id DESC').map(c=>`<div class="row"><div><div class="row-title">${c.name}</div><div class="row-sub">${c.phone} · ${c.address}</div></div><span class="chip">ID ${c.id}</span></div>`).join('')}</div>`},receivables(){return `${currentUser.role!=='owner'?`<div class="card"><h3>Tambah Transaksi Piutang</h3>${formReceivable()}</div>`:''}<div class="section-title">Daftar Piutang</div><div class="list">${receivableRows().map(rowHtml).join('')}</div>`},payments(){return `<div class="card"><h3>Catat Pembayaran</h3>${formPayment()}</div><div class="section-title">Riwayat Pembayaran</div><div class="list">${query('SELECT p.*,r.invoice_no,c.name customer FROM payments p JOIN receivables r ON r.id=p.receivable_id JOIN customers c ON c.id=r.customer_id ORDER BY p.id DESC').map(p=>`<div class="row"><div><div class="row-title">${fmt(p.amount)} · ${p.invoice_no}</div><div class="row-sub">${p.customer} · ${p.payment_date} · ${p.method}</div></div></div>`).join('')}</div>`},reports(){return `<div class="card no-print"><h3>Filter Laporan</h3><label>Awal</label><input id="periodStart" type="date" class="input" value="2026-07-01"><label>Akhir</label><input id="periodEnd" type="date" class="input" value="${today()}"><div class="btn-row" style="margin-top:12px">${currentUser.role==='manager'?'<button class="btn btn-primary" onclick="App.generateReport()">Generate PDF</button>':''}<button class="btn btn-soft" onclick="window.print()">Cetak</button></div></div><div class="section-title">Preview Laporan</div><div class="report-preview" id="reportBox">${reportHtml()}</div><div class="section-title no-print">Riwayat Laporan PDF</div><div class="list no-print">${query('SELECT r.*,p.full_name FROM reports r JOIN profiles p ON p.id=r.created_by ORDER BY r.id DESC').map(r=>`<div class="row"><div><div class="row-title">${r.report_no}</div><div class="row-sub">${r.report_type} · ${r.created_at}</div></div><button class="btn btn-soft" onclick="window.print()">Cetak</button></div>`).join('')||'<p class="muted">Belum ada laporan.</p>'}</div>`},settings(){return `<div class="card"><h3>Pengaturan Data Lokal</h3><p class="muted">Database berjalan offline dengan sql.js, auto-save ke IndexedDB, dan fallback RAM bila penyimpanan gagal.</p><div class="btn-row" style="margin-top:14px"><button class="btn btn-primary" onclick="App.exportDb()">Cadangkan Data</button><label class="btn btn-soft">Pulihkan Data<input type="file" accept=".sqlite,.db" hidden onchange="App.importDb(event)"></label></div></div><div class="section-title">Ubah Password</div><div class="card"><label>Password Baru</label><input id="newPass" class="input"><button class="btn btn-primary" style="margin-top:12px" onclick="App.changePass()">Simpan Password</button></div>`}};function formUser(){return `<label>Nama</label><input id="uName" class="input"><label>Email</label><input id="uEmail" class="input"><label>Password</label><input id="uPass" class="input"><label>Role</label><select id="uRole" class="input"><option value="admin">Admin</option><option value="sales">Staf Penjualan</option><option value="finance">Staf Keuangan</option><option value="manager">Manajer Keuangan</option><option value="owner">Pemilik</option></select><button class="btn btn-primary" style="margin-top:12px" onclick="App.addUser()">Simpan</button>`}function formCustomer(){return `<label>Nama Pelanggan</label><input id="cName" class="input"><label>Telepon</label><input id="cPhone" class="input"><label>Email</label><input id="cEmail" class="input"><label>Alamat</label><input id="cAddress" class="input"><button class="btn btn-primary" style="margin-top:12px" onclick="App.addCustomer()">Simpan</button>`}function formReceivable(){let cs=query('SELECT id,name FROM customers');if(!cs||cs.length===0)return `<p class="muted">Tambah pelanggan terlebih dahulu</p>`;return `<label>Pelanggan</label><select id="rCustomer" class="input">${cs.map(c=>`<option value="${c.id}">${c.name}</option>`)}</select><label>Nomor Faktur</label><input id="rInv" class="input" value="INV-${Date.now().toString().slice(-6)}"><label>Nominal</label><input id="rAmount" type="number" class="input"><label>Jatuh Tempo</label><input id="rDue" type="date" class="input" value="${today()}"><button class="btn btn-primary" style="margin-top:12px" onclick="App.addReceivable()">Simpan</button>`}function formPayment(){let rs=receivableRows().filter(r=>r.status!=='paid');if(!rs||rs.length===0)return `<p class="muted">Tidak ada piutang yang perlu dibayar</p>`;return `<label>Faktur</label><select id="pRec" class="input">${rs.map(r=>`<option value="${r.id}">${r.invoice_no} - ${r.customer} (${fmt(r.remaining_amount)})</option>`)}</select><label>Nominal Pembayaran</label><input id="pAmount" type="number" class="input"><label>Metode</label><select id="pMethod" class="input"><option>Transfer</option><option>Tunai</option><option>Giro</option></select><label>Keterangan</label><input id="pNote" class="input"><button class="btn btn-primary" style="margin-top:12px" onclick="App.addPayment()">Catat Pembayaran</button>`}function receivableRows(){return query('SELECT r.*,c.name customer FROM receivables r JOIN customers c ON c.id=r.customer_id ORDER BY r.id DESC')}function rowHtml(r){let cls=r.status==='paid'?'green':(r.due_date<today()?'red':'orange');return `<div class="row"><div class="row-main"><div class="row-title">${r.invoice_no} · ${r.customer}</div><div class="row-sub">Total ${fmt(r.amount)} · Sisa ${fmt(r.remaining_amount)} · JT ${r.due_date}</div></div><span class="chip ${cls}">${r.status==='paid'?'Lunas':(r.due_date<today()?'Tempo':'Belum')}</span></div>`}function addUser(){const name=val('uName'),email=val('uEmail'),pass=val('uPass'),role=val('uRole');if(!name||!email||!pass||!role){toast('Semua field harus diisi');return}exec('INSERT INTO profiles(full_name,email,password,role) VALUES(?,?,?,?)',[name,email,pass,role]);toast('Pengguna tersimpan.');render()}function addCustomer(){const name=val('cName'),phone=val('cPhone'),email=val('cEmail'),address=val('cAddress');if(!name){toast('Nama pelanggan harus diisi');return}exec('INSERT INTO customers(name,phone,email,address,created_by) VALUES(?,?,?,?,?)',[name,phone,email,address,currentUser.id]);toast('Pelanggan tersimpan.');render()}function addReceivable(){const cust=val('rCustomer'),inv=val('rInv'),amount=val('rAmount'),due=val('rDue');if(!cust||!inv||!amount||!due){toast('Semua field harus diisi');return}if(isNaN(amount)||amount<=0){toast('Nominal harus lebih besar dari 0');return}exec('INSERT INTO receivables(customer_id,invoice_no,transaction_date,amount,due_date,created_by) VALUES(?,?,?,?,?,?)',[cust,inv,today(),+amount,due,currentUser.id]);toast('Piutang tercatat.');render()}function addPayment(){const rec=val('pRec'),amount=val('pAmount'),method=val('pMethod'),note=val('pNote');if(!rec||!amount||!method){toast('Faktur, nominal, dan metode harus diisi');return}if(isNaN(amount)||amount<=0){toast('Nominal harus lebih besar dari 0');return}exec('INSERT INTO payments(receivable_id,payment_date,amount,method,note,created_by) VALUES(?,?,?,?,?,?)',[rec,today(),+amount,method,note,currentUser.id]);toast('Pembayaran tercatat dan trigger memperbarui sisa piutang.');render()}function changePass(){const newPass=val('newPass');if(!newPass){toast('Password baru harus diisi');return}exec('UPDATE profiles SET password=? WHERE id=?',[newPass,currentUser.id]);toast('Password diperbarui.')}function reportHtml(){const s=stats(),rows=receivableRows();return `<h2>PiutangKu</h2><p class="muted">Laporan Ringkas Piutang Perusahaan</p><hr><p>Total Piutang: <b>${fmt(s.total)}</b><br>Total Pembayaran: <b>${fmt(s.paid)}</b><br>Sisa Piutang: <b>${fmt(s.remaining)}</b><br>Piutang Jatuh Tempo: <b>${s.overdue} faktur</b></p><table style="width:100%;border-collapse:collapse"><thead><tr><th align="left">Faktur</th><th align="left">Pelanggan</th><th align="right">Sisa</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.invoice_no}</td><td>${r.customer}</td><td align="right">${fmt(r.remaining_amount)}</td></tr>`).join('')}</tbody></table>`}function generateReport(){const no='RPT-'+Date.now();exec('INSERT INTO reports(report_no,report_type,period_start,period_end,created_by,pdf_content) VALUES(?,?,?,?,?,?)',[no,'Laporan Piutang',val('periodStart'),val('periodEnd'),currentUser.id,btoa(unescape(encodeURIComponent(reportHtml())))]);toast('Laporan PDF virtual dibuat. Gunakan Cetak untuk simpan PDF.');render()}function drawChart(){const ctx=document.getElementById('chart');if(!ctx)return;const s=stats();if(chart)chart.destroy();chart=new Chart(ctx,{type:'doughnut',data:{labels:['Terbayar','Sisa Piutang'],datasets:[{data:[s.paid,s.remaining],backgroundColor:['#16a34a','#2563eb'],borderWidth:0}]},options:{plugins:{legend:{position:'bottom'}},cutout:'68%'}})}function exportDb(){const blob=new Blob([db.export()],{type:'application/octet-stream'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='piutangku-backup.sqlite';a.click()}function importDb(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{db=new SQL.Database(new Uint8Array(r.result));await persist();toast('Data berhasil dipulihkan.');render()};r.readAsArrayBuffer(f)}return{boot,login,logout,nav,addUser,addCustomer,addReceivable,addPayment,changePass,generateReport,exportDb,importDb}})();App.boot();
</script></body></html>
