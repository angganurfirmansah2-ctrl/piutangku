<body>
<div id="app"></div>

<script>
// ============ DATABASE SETUP ============
let db, SQL;
let currentUser = null;
let currentPage = 'login';

const IDB_NAME = 'PiutangKuDB';
const IDB_STORE = 'database';

// ============ UTILITY FUNCTIONS ============
const fmt = (n) => {
  return new Intl.NumberFormat('id-ID', {
    style: 'currency',
    currency: 'IDR',
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
  }).format(Number(n) || 0);
};

const today = () => new Date().toISOString().split('T')[0];

const toast = (msg, type = 'info') => {
  const container = document.querySelector('.toast-container') || (() => {
    const div = document.createElement('div');
    div.className = 'toast-container';
    document.body.appendChild(div);
    return div;
  })();
  
  const toast = document.createElement('div');
  toast.className = `toast-message`;
  toast.textContent = msg;
  toast.style.background = type === 'error' ? '#ff6b6b' : type === 'success' ? '#51cf66' : '#667eea';
  container.appendChild(toast);
  
  setTimeout(() => toast.remove(), 3000);
};

// ============ INDEXEDDB FUNCTIONS ============
async function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(IDB_NAME, 1);
    
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
    
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE);
      }
    };
  });
}

async function saveDB() {
  const idb = await initDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    const store = tx.objectStore(IDB_STORE);
    const request = store.put(db.export(), 'main');
    
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve();
  });
}

async function loadDB() {
  const idb = await initDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readonly');
    const store = tx.objectStore(IDB_STORE);
    const request = store.get('main');
    
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
  });
}

// ============ SCHEMA & SEED ============
function createSchema() {
  db.run(`
    CREATE TABLE IF NOT EXISTS users (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      name TEXT NOT NULL,
      email TEXT UNIQUE NOT NULL,
      password TEXT NOT NULL,
      role TEXT CHECK(role IN('admin','manager','staff')) DEFAULT 'staff'
    );

    CREATE TABLE IF NOT EXISTS customers (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      name TEXT NOT NULL,
      email TEXT,
      phone TEXT,
      address TEXT,
      created_at TEXT DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS invoices (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      invoice_no TEXT UNIQUE NOT NULL,
      customer_id INTEGER NOT NULL,
      amount REAL NOT NULL,
      due_date TEXT NOT NULL,
      status TEXT CHECK(status IN('unpaid','partial','paid')) DEFAULT 'unpaid',
      created_at TEXT DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY(customer_id) REFERENCES customers(id)
    );

    CREATE TABLE IF NOT EXISTS payments (
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      invoice_id INTEGER NOT NULL,
      amount REAL NOT NULL,
      payment_date TEXT NOT NULL,
      method TEXT,
      created_at TEXT DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY(invoice_id) REFERENCES invoices(id)
    );
  `);
}

function seedData() {
  try {
    // Check if data exists
    const result = db.exec("SELECT COUNT(*) as count FROM users");
    if (result[0] && result[0].values[0][0] > 0) return;

    // Seed users
    db.run("INSERT INTO users (name, email, password, role) VALUES (?, ?, ?, ?)", ['Admin', 'admin@piutangku.com', 'admin123', 'admin']);
    db.run("INSERT INTO users (name, email, password, role) VALUES (?, ?, ?, ?)", ['Manager', 'manager@piutangku.com', 'manager123', 'manager']);
    db.run("INSERT INTO users (name, email, password, role) VALUES (?, ?, ?, ?)", ['Staff', 'staff@piutangku.com', 'staff123', 'staff']);

    // Seed customers
    db.run("INSERT INTO customers (name, email, phone, address) VALUES (?, ?, ?, ?)", ['PT Sumber Makmur', 'pt@sumber.com', '081234567001', 'Jakarta']);
    db.run("INSERT INTO customers (name, email, phone, address) VALUES (?, ?, ?, ?)", ['CV Maju Jaya', 'cv@maju.com', '081234567002', 'Bandung']);
    db.run("INSERT INTO customers (name, email, phone, address) VALUES (?, ?, ?, ?)", ['Toko Berkah', 'toko@berkah.com', '081234567003', 'Surabaya']);

    // Seed invoices
    db.run("INSERT INTO invoices (invoice_no, customer_id, amount, due_date, status) VALUES (?, ?, ?, ?, ?)", ['INV-001', 1, 5000000, '2026-07-20', 'unpaid']);
    db.run("INSERT INTO invoices (invoice_no, customer_id, amount, due_date, status) VALUES (?, ?, ?, ?, ?)", ['INV-002', 2, 3000000, '2026-07-15', 'partial']);
    db.run("INSERT INTO invoices (invoice_no, customer_id, amount, due_date, status) VALUES (?, ?, ?, ?, ?)", ['INV-003', 3, 2000000, '2026-07-25', 'paid']);

    // Seed payment
    db.run("INSERT INTO payments (invoice_id, amount, payment_date, method) VALUES (?, ?, ?, ?)", [2, 1500000, today(), 'Transfer']);
  } catch (e) {
    console.error('Seed error:', e);
  }
}

// ============ DATABASE QUERIES ============
function executeQuery(sql, params = []) {
  try {
    return db.exec(sql, params);
  } catch (e) {
    console.error('Query error:', e);
    return [];
  }
}

function getQuery(sql, params = []) {
  const result = executeQuery(sql, params);
  if (result.length === 0) return [];
  
  const columns = result[0].columns;
  return result[0].values.map(row => {
    const obj = {};
    columns.forEach((col, i) => obj[col] = row[i]);
    return obj;
  });
}

// ============ AUTH FUNCTIONS ============
function login(email, password) {
  const users = getQuery('SELECT * FROM users WHERE email = ? AND password = ?', [email, password]);
  
  if (users.length === 0) {
    toast('Email atau password salah', 'error');
    return false;
  }

  currentUser = users[0];
  currentPage = 'dashboard';
  render();
  return true;
}

function logout() {
  currentUser = null;
  currentPage = 'login';
  render();
}

// ============ PAGE RENDERS ============

  return `

      <div class="login-container">
        <h1>🏦 PiutangKu</h1>
        <p style="text-align:center;color:#666;margin-bottom:30px">Sistem Manajemen Piutang Local-First</p>

        </div>
        
        <div class="form-group">

          <input type="password" id="loginPassword" placeholder="admin123" value="admin123">
        </div>
        
        <button class="btn-submit" onclick="handleLogin()">Masuk</button>
        
        <div style="margin-top:20px;padding:15px;background:#f0f7ff;border-radius:6px;font-size:12px;color:#666">
          <strong>Demo Accounts:</strong><br>

          📧 manager@piutangku.com / manager123<br>

}

function renderDashboard() {
  const stats = getQuery(`
    SELECT 
      (SELECT COUNT(*) FROM invoices) as total_invoices,
      (SELECT COUNT(*) FROM invoices WHERE status='unpaid') as unpaid_count,
      (SELECT COALESCE(SUM(amount), 0) FROM invoices WHERE status='unpaid') as unpaid_amount,
      (SELECT COALESCE(SUM(amount), 0) FROM invoices) as total_amount
  `)[0];

  return `
    <div class="container">
      <div class="header">
        <div class="logo">🏦 PiutangKu</div>
        <div class="nav-buttons">
          <button onclick="goToPage('customers')">👥 Pelanggan</button>
          <button onclick="goToPage('invoices')">🧾 Piutang</button>
          <button onclick="goToPage('payments')">💳 Pembayaran</button>
          <button onclick="logout()">🚪 Logout</button>
        </div>
      </div>

      <div style="background:#f0f7ff;padding:15px;border-radius:8px;margin-bottom:20px">
        <strong>${currentUser.name}</strong> (${currentUser.role}) | ${currentUser.email}
      </div>

      <div class="main-content">
        <div class="stat-card">
          <h3>Total Piutang</h3>
          <div class="value">${fmt(stats.total_amount)}</div>
        </div>
        <div class="stat-card">
          <h3>Belum Dibayar</h3>
          <div class="value">${fmt(stats.unpaid_amount)}</div>
        </div>
        <div class="stat-card">
          <h3>Jumlah Faktur</h3>
          <div class="value">${stats.total_invoices}</div>
        </div>
        <div class="stat-card">
          <h3>Faktur Overdue</h3>
          <div class="value">${getQuery("SELECT COUNT(*) as count FROM invoices WHERE status='unpaid' AND due_date < date('now')")[0].count}</div>
        </div>
      </div>

      <div class="form-section">
        <h2>📊 Ringkasan Piutang Terbaru</h2>
        <div class="table-container">
          <table>
            <thead class="table-header">
              <tr>
                <th>Faktur</th>
                <th>Pelanggan</th>
                <th>Jumlah</th>
                <th>Jatuh Tempo</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody class="table-body">
              ${getQuery(`
                SELECT i.*, c.name as customer_name 
                FROM invoices i 
                JOIN customers c ON i.customer_id = c.id 
                ORDER BY i.created_at DESC 
                LIMIT 5
              `).map(inv => `
                <tr>
                  <td><strong>${inv.invoice_no}</strong></td>
                  <td>${inv.customer_name}</td>
                  <td>${fmt(inv.amount)}</td>
                  <td>${inv.due_date}</td>
                  <td><span style="background:${inv.status === 'paid' ? '#d4edda' : inv.status === 'partial' ? '#fff3cd' : '#f8d7da'};padding:4px 8px;border-radius:4px;font-size:12px;font-weight:600">${inv.status.toUpperCase()}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderCustomers() {
  const customers = getQuery('SELECT * FROM customers ORDER BY created_at DESC');

  return `
    <div class="container">
      <div class="header">

function renderInvoices() {
  const invoices = getQuery(`
    SELECT i.*, c.name as customer_name 
    FROM invoices i 
    JOIN customers c ON i.customer_id = c.id 
    ORDER BY i.created_at DESC
  `);
  const customers = getQuery('SELECT * FROM customers');

  return `
    <div class="container">

        <button class="nav-buttons" onclick="goToPage('dashboard')" style="border:none;background:#667eea;color:white;padding:10px 20px;border-radius:6px;cursor:pointer">← Kembali</button>

function renderPayments() {
  const payments = getQuery(`
    SELECT p.*, i.invoice_no, c.name as customer_name 
    FROM payments p 
    JOIN invoices i ON p.invoice_id = i.id 
    JOIN customers c ON i.customer_id = c.id 
    ORDER BY p.created_at DESC
  `);
  const invoices = getQuery(`
    SELECT i.* FROM invoices i WHERE i.status != 'paid' ORDER BY i.invoice_no
  `);

  return `
    <div class="container">
      <div class="header">
        <div class="logo">💳 Pembayaran</div>
        <button class="nav-buttons" onclick="goToPage('dashboard')" style="border:none;background:#667eea;color:white;padding:10px 20px;border-radius:6px;cursor:pointer">← Kembali</button>

// ============ CRUD FUNCTIONS ============
function addCustomer() {
  const name = document.getElementById('customerName')?.value || '';
  const email = document.getElementById('customerEmail')?.value || '';
  const phone = document.getElementById('customerPhone')?.value || '';
  const address = document.getElementById('customerAddress')?.value || '';

  if (!name) {
    toast('Nama pelanggan harus diisi', 'error');
    return;
  }

  db.run('INSERT INTO customers (name, email, phone, address) VALUES (?, ?, ?, ?)', [name, email, phone, address]);
  saveDB();
  toast('Pelanggan berhasil ditambahkan', 'success');
  
  document.getElementById('customerName').value = '';
  document.getElementById('customerEmail').value = '';
  document.getElementById('customerPhone').value = '';
  document.getElementById('customerAddress').value = '';
  
  render();
}

function deleteCustomer(id) {
  if (!confirm('Yakin ingin menghapus pelanggan ini?')) return;
  db.run('DELETE FROM customers WHERE id = ?', [id]);
  saveDB();
  toast('Pelanggan dihapus', 'success');
  render();
}

function addInvoice() {
  const customerId = document.getElementById('invoiceCustomer')?.value || '';
  const invoiceNo = document.getElementById('invoiceNo')?.value || '';
  const amount = parseFloat(document.getElementById('invoiceAmount')?.value || 0);
  const dueDate = document.getElementById('invoiceDueDate')?.value || '';

  if (!customerId || !invoiceNo || amount <= 0 || !dueDate) {
    toast('Semua field harus diisi dengan benar', 'error');
    return;
  }

  db.run('INSERT INTO invoices (customer_id, invoice_no, amount, due_date) VALUES (?, ?, ?, ?)', 
    [customerId, invoiceNo, amount, dueDate]);
  saveDB();
  toast('Faktur berhasil ditambahkan', 'success');
  
  document.getElementById('invoiceCustomer').value = '';
  document.getElementById('invoiceNo').value = '';
  document.getElementById('invoiceAmount').value = '';
  
  render();
}

function deleteInvoice(id) {
  if (!confirm('Yakin ingin menghapus faktur ini?')) return;
  db.run('DELETE FROM invoices WHERE id = ?', [id]);
  saveDB();
  toast('Faktur dihapus', 'success');
  render();
}

function addPayment() {
  const invoiceId = document.getElementById('paymentInvoice')?.value || '';
  const amount = parseFloat(document.getElementById('paymentAmount')?.value || 0);
  const paymentDate = document.getElementById('paymentDate')?.value || '';
  const method = document.getElementById('paymentMethod')?.value || '';

  if (!invoiceId || amount <= 0 || !paymentDate) {
    toast('Semua field harus diisi dengan benar', 'error');
    return;
  }

  db.run('INSERT INTO payments (invoice_id, amount, payment_date, method) VALUES (?, ?, ?, ?)', 
    [invoiceId, amount, paymentDate, method]);

  // Update invoice status
  const invoice = getQuery('SELECT * FROM invoices WHERE id = ?', [invoiceId])[0];
  if (invoice) {
    const totalPaid = getQuery('SELECT COALESCE(SUM(amount), 0) as total FROM payments WHERE invoice_id = ?', [invoiceId])[0].total + amount;
    let status = 'unpaid';
    if (totalPaid >= invoice.amount) {
      status = 'paid';
    } else if (totalPaid > 0) {
      status = 'partial';
    }
    db.run('UPDATE invoices SET status = ? WHERE id = ?', [status, invoiceId]);
  }

  saveDB();
  toast('Pembayaran berhasil dicatat', 'success');
  
  document.getElementById('paymentInvoice').value = '';
  document.getElementById('paymentAmount').value = '';
  
  render();
}

// ============ NAVIGATION ============
function goToPage(page) {
  if (!currentUser) {
    currentPage = 'login';
  } else {
    currentPage = page;
  }
  render();
}

function handleLogin() {
  const email = document.getElementById('loginEmail')?.value || '';
  const password = document.getElementById('loginPassword')?.value || '';
  
  if (!email || !password) {
    toast('Email dan password harus diisi', 'error');
    return;
  }

  login(email, password);
}

// ============ MAIN RENDER ============
function render() {
  const app = document.getElementById('app');
  
  if (!currentUser) {
    app.innerHTML = renderLogin();
  } else if (currentPage === 'dashboard') {
    app.innerHTML = renderDashboard();
  } else if (currentPage === 'customers') {
    app.innerHTML = renderCustomers();
  } else if (currentPage === 'invoices') {
    app.innerHTML = renderInvoices();
  } else if (currentPage === 'payments') {
    app.innerHTML = renderPayments();
  } else {
    app.innerHTML = renderDashboard();
  }
}

// ============ BOOT ============
async function boot() {
  try {
    SQL = await initSqlJs({
      locateFile: file => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${file}`
    });

    let savedDB = await loadDB();
    
    if (savedDB) {
      db = new SQL.Database(new Uint8Array(savedDB));
    } else {
      db = new SQL.Database();
      createSchema();
      seedData();
      await saveDB();
    }

    render();
  } catch (error) {
    console.error('Boot error:', error);
    toast('Error menginisialisasi aplikasi', 'error');
  }
}

// Start app
boot();
</script>
