    :root {
      --bg-app: radial-gradient(circle at top left, #1e1b4b 0%, #0f0728 50%, #03001e 100%);
      --surface: rgba(30, 27, 75, 0.45);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --surface-2: rgba(255, 255, 255, 0.05);

      --primary-accent: #818cf8;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(129, 140, 248, 0.4);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #f43f5e;
      --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      --radius: 24px;
      --glass-blur: 24px;

    * {

      transition: background-color 0.25s ease, border-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;

    body {
      background: radial-gradient(circle at top left, #111827, #030712);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      outline: none;
    }

    #app {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      padding: 20px;
    }

    .app-container {
      aspect-ratio: 10/21;
      height: min(915px, calc(100vh - 40px));

      background: var(--bg-app);

      align-items: center;

      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);

    .app-notch:after {
      content: '';
      width: 8px;
      height: 8px;
      background: #1e293b;
      border-radius: 50%;
      margin-left: 60px;
      box-shadow: 0 0 4px rgba(99,102,241,0.5);

    .phone-status-bar {

      top: 0;
      left: 0;
      right: 0;

    .scroll::-webkit-scrollbar {

<script>
const IDB_NAME = 'piutangku-db-v1';
const IDB_STORE = 'sqlite';
const IDB_KEY = 'main';

let SQL, db, session = null, currentRoute = 'dashboard', chart = null, fallback = false;

const rupiah = n => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(Number(n || 0));
const today = () => new Date().toISOString().slice(0, 10);
const uid = p => p + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const $ = s => document.querySelector(s);

setInterval(() => {
  const clockEl = $('#clock');
  if (clockEl) {
    clockEl.textContent = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }
}, 1000);

function toast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

function idb() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(IDB_STORE);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}

async function idbGet() {
  const x = await idb();
  return new Promise((res, rej) => {
    const t = x.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(IDB_KEY);
    t.onsuccess = () => res(t.result);
    t.onerror = () => rej(t.error);
  });
}

async function idbSet(data) {
  const x = await idb();
  return new Promise((res, rej) => {
    const t = x.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).put(data, IDB_KEY);
    t.onsuccess = () => res();
    t.onerror = () => rej(t.error);
  });
}

function localSave() {
  try {
    localStorage.setItem('piutangku_sqlite_b64', btoa(String.fromCharCode(...db.export())));
  } catch (e) {
    console.error('Local fallback storage failed:', e);
  }
}

async function persist() {
  try {
    await idbSet(db.export());
  } catch (e) {
    fallback = true;
    localSave();
  }
}

function exec(sql, params = []) {
  db.run(sql, params);
  return persist();
}

function all(sql, params = []) {
  const st = db.prepare(sql, params);
  const rows = [];
  while (st.step()) {
    rows.push(st.getAsObject());
  }
  st.free();
  return rows;
}

function one(sql, params = []) {
  return all(sql, params)[0] || null;
}

function schema() {
  db.run(`PRAGMA foreign_keys=ON;
  CREATE TABLE IF NOT EXISTS profiles(
    id TEXT PRIMARY KEY,
    name TEXT NOT NULL,
    email TEXT UNIQUE NOT NULL,
    password TEXT NOT NULL,
    role TEXT CHECK(role IN('admin','finance','owner')) NOT NULL,
    is_active INTEGER DEFAULT 1,
    created_at TEXT DEFAULT CURRENT_TIMESTAMP
  );
  CREATE TABLE IF NOT EXISTS customers(
    id TEXT PRIMARY KEY,
    name TEXT NOT NULL,
    phone TEXT,
    address TEXT,
    notes TEXT,
    created_at TEXT DEFAULT CURRENT_TIMESTAMP
  );
  CREATE TABLE IF NOT EXISTS receivables(
    id TEXT PRIMARY KEY,
    customer_id TEXT NOT NULL,
    invoice_no TEXT UNIQUE NOT NULL,
    transaction_date TEXT NOT NULL,
    due_date TEXT NOT NULL,
    principal_amount REAL NOT NULL CHECK(principal_amount>=0),
    remaining_amount REAL NOT NULL DEFAULT 0,
    status TEXT CHECK(status IN('unpaid','partial','paid','overdue')) DEFAULT 'unpaid',
    description TEXT,
    attachment_base64 TEXT,
    created_by TEXT,
    created_at TEXT DEFAULT CURRENT_TIMESTAMP,
    FOREIGN KEY(customer_id) REFERENCES customers(id) ON DELETE CASCADE,
    FOREIGN KEY(created_by) REFERENCES profiles(id)
  );
  CREATE TABLE IF NOT EXISTS payments(
    id TEXT PRIMARY KEY,
    receivable_id TEXT NOT NULL,
    payment_date TEXT NOT NULL,
    amount REAL NOT NULL CHECK(amount>0),
    note TEXT,
    created_by TEXT,
    created_at TEXT DEFAULT CURRENT_TIMESTAMP,
    FOREIGN KEY(receivable_id) REFERENCES receivables(id) ON DELETE CASCADE,
    FOREIGN KEY(created_by) REFERENCES profiles(id)
  );
  CREATE TABLE IF NOT EXISTS audit_logs(
    id TEXT PRIMARY KEY,
    actor_id TEXT,
    action TEXT,
    entity TEXT,
    entity_id TEXT,
    created_at TEXT DEFAULT CURRENT_TIMESTAMP
  );

  DROP TRIGGER IF EXISTS trg_receivable_insert;
  CREATE TRIGGER trg_receivable_insert AFTER INSERT ON receivables 
  BEGIN 
    UPDATE receivables 
    SET remaining_amount = NEW.principal_amount,
        status = CASE WHEN date(NEW.due_date) < date('now', 'localtime') THEN 'overdue' ELSE 'unpaid' END 
    WHERE id = NEW.id;
  END;

  DROP TRIGGER IF EXISTS trg_receivable_update;
  CREATE TRIGGER trg_receivable_update AFTER UPDATE OF principal_amount, due_date ON receivables
  BEGIN
    UPDATE receivables
    SET remaining_amount = max(NEW.principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = NEW.id), 0),
        status = CASE 
          WHEN NEW.principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = NEW.id) <= 0 THEN 'paid'
          WHEN NEW.principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = NEW.id) = NEW.principal_amount THEN
            CASE WHEN date(NEW.due_date) < date('now', 'localtime') THEN 'overdue' ELSE 'unpaid' END
          WHEN date(NEW.due_date) < date('now', 'localtime') THEN 'overdue'
          ELSE 'partial'
        END
    WHERE id = NEW.id;
  END;

  DROP TRIGGER IF EXISTS trg_payment_insert;
  CREATE TRIGGER trg_payment_insert AFTER INSERT ON payments 
  BEGIN 
    UPDATE receivables 
    SET remaining_amount = max(principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = NEW.receivable_id), 0),
        status = CASE 
          WHEN principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = NEW.receivable_id) <= 0 THEN 'paid' 
          WHEN principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = NEW.receivable_id) = principal_amount THEN
            CASE WHEN date(due_date) < date('now', 'localtime') THEN 'overdue' ELSE 'unpaid' END
          WHEN date(due_date) < date('now', 'localtime') THEN 'overdue' 
          ELSE 'partial' 
        END 
    WHERE id = NEW.receivable_id;
  END;

  DROP TRIGGER IF EXISTS trg_payment_update;
  CREATE TRIGGER trg_payment_update AFTER UPDATE ON payments 
  BEGIN 
    UPDATE receivables 
    SET remaining_amount = max(principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = NEW.receivable_id), 0),
        status = CASE 
          WHEN principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = NEW.receivable_id) <= 0 THEN 'paid' 
          WHEN principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = NEW.receivable_id) = principal_amount THEN
            CASE WHEN date(due_date) < date('now', 'localtime') THEN 'overdue' ELSE 'unpaid' END
          WHEN date(due_date) < date('now', 'localtime') THEN 'overdue' 
          ELSE 'partial' 
        END 
    WHERE id = NEW.receivable_id;
  END;

  DROP TRIGGER IF EXISTS trg_payment_delete;
  CREATE TRIGGER trg_payment_delete AFTER DELETE ON payments 
  BEGIN 
    UPDATE receivables 
    SET remaining_amount = max(principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = OLD.receivable_id), 0),
        status = CASE 
          WHEN principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = OLD.receivable_id) <= 0 THEN 'paid' 
          WHEN principal_amount - (SELECT COALESCE(SUM(amount), 0) FROM payments WHERE receivable_id = OLD.receivable_id) = principal_amount THEN
            CASE WHEN date(due_date) < date('now', 'localtime') THEN 'overdue' ELSE 'unpaid' END
          WHEN date(due_date) < date('now', 'localtime') THEN 'overdue' 
          ELSE 'partial' 
        END 
    WHERE id = OLD.receivable_id;
  END;`);
}

const Services = {
  auth: {
    login(email, password) {
      const u = one('SELECT * FROM profiles WHERE email=? AND password=? AND is_active=1', [email, password]);
      if (u) {
        session = u;
        localStorage.setItem('piutangku_session', u.id);
      }
      return u;
    },
    restore() {
      const id = localStorage.getItem('piutangku_session');
      if (id) session = one('SELECT * FROM profiles WHERE id=?', [id]);
    },
    logout() {
      session = null;
      localStorage.removeItem('piutangku_session');
    }
  },
  users: {
    list: () => all('SELECT * FROM profiles ORDER BY role, name'),
    save: u => exec(u.id ? 'UPDATE profiles SET name=?,email=?,password=?,role=?,is_active=? WHERE id=?' : 'INSERT INTO profiles(id,name,email,password,role,is_active) VALUES (?,?,?,?,?,?)', u.id ? [u.name, u.email, u.password, u.role, u.is_active, u.id] : [uid('u'), u.name, u.email, u.password, u.role, 1]),
    remove: id => exec('DELETE FROM profiles WHERE id=?', [id])
  },
  customers: {
    list: q => all(`SELECT c.*, COALESCE(SUM(r.remaining_amount), 0) debt FROM customers c LEFT JOIN receivables r ON r.customer_id=c.id GROUP BY c.id HAVING c.name LIKE ? OR c.phone LIKE ? ORDER BY c.name`, [`%${q || ''}%`, `%${q || ''}%`]),
    save: c => exec(c.id ? 'UPDATE customers SET name=?,phone=?,address=?,notes=? WHERE id=?' : 'INSERT INTO customers(id,name,phone,address,notes) VALUES (?,?,?,?,?)', c.id ? [c.name, c.phone, c.address, c.notes, c.id] : [uid('c'), c.name, c.phone, c.address, c.notes]),
    remove: id => exec('DELETE FROM customers WHERE id=?', [id])
  },
  receivables: {
    list: f => all(`SELECT r.*, c.name customer_name, (SELECT COALESCE(SUM(amount), 0) FROM payments p WHERE p.receivable_id=r.id) paid FROM receivables r JOIN customers c ON c.id=r.customer_id WHERE (?='all' OR r.status=?) ORDER BY r.due_date ASC`, [f || 'all', f || 'all']),
    save: r => exec(r.id ? 'UPDATE receivables SET customer_id=?,invoice_no=?,transaction_date=?,due_date=?,principal_amount=?,description=?,attachment_base64=? WHERE id=?' : 'INSERT INTO receivables(id,customer_id,invoice_no,transaction_date,due_date,principal_amount,description,attachment_base64,created_by) VALUES (?,?,?,?,?,?,?,?,?)', r.id ? [r.customer_id, r.invoice_no, r.transaction_date, r.due_date, r.principal_amount, r.description, r.attachment_base64, r.id] : [uid('r'), r.customer_id, r.invoice_no, r.transaction_date, r.due_date, r.principal_amount, r.description, r.attachment_base64, session.id]),
    remove: id => exec('DELETE FROM receivables WHERE id=?', [id])
  },
  payments: {
    list: id => all('SELECT p.*, r.invoice_no, c.name customer_name FROM payments p JOIN receivables r ON r.id=p.receivable_id JOIN customers c ON c.id=r.customer_id WHERE (? IS NULL OR p.receivable_id=?) ORDER BY p.payment_date DESC', [id || null, id || null]),
    save: p => exec('INSERT INTO payments(id,receivable_id,payment_date,amount,note,created_by) VALUES (?,?,?,?,?,?)', [uid('p'), p.receivable_id, p.payment_date, p.amount, p.note, session.id])
  },
  report: {
    summary() {
      return one(`SELECT (SELECT COUNT(*) FROM profiles) users,
                        (SELECT COUNT(*) FROM customers) customers,
                        (SELECT COUNT(*) FROM receivables) transactions,
                        (SELECT COALESCE(SUM(principal_amount), 0) FROM receivables) principal,
                        (SELECT COALESCE(SUM(amount), 0) FROM payments) paid,
                        (SELECT COALESCE(SUM(remaining_amount), 0) FROM receivables) remaining,
                        (SELECT COUNT(DISTINCT customer_id) FROM receivables WHERE remaining_amount>0) debtors`);
    }
  }
};

function can(action) {
  const r = session?.role;
  return {
    manageUsers: r === 'admin',
    writeCustomers: r === 'admin' || r === 'finance',
    writeReceivables: r === 'finance',
    writePayments: r === 'finance',
    settings: r === 'admin' || r === 'finance',
    readAll: !!r
  }[action];
}

function roleLabel(r) {
  return { admin: 'Admin', finance: 'Staf Keuangan', owner: 'Pemilik Usaha' }[r] || r;
}

function statusChip(s) {
  return s === 'paid' ? '<span class="chip ok">Lunas</span>' : s === 'partial' ? '<span class="chip warn">Sebagian</span>' : s === 'overdue' ? '<span class="chip bad">Jatuh Tempo</span>' : '<span class="chip warn">Belum Lunas</span>';
}

function openModal(html) {
  $('#modalContent').innerHTML = html;
  $('#modal').classList.add('show');

  $('#modal').classList.remove('show');
}

$('#modal').onclick = e => {
  if (e.target.id === 'modal') closeModal();
};

function customerForm(id = null) {
  const c = id ? one('SELECT * FROM customers WHERE id=?', [id]) : {};
  openModal(`<h2>${c.id ? 'Edit' : 'Tambah'} Pelanggan</h2>
  <div class="form">
    <input id="cn" class="input" placeholder="Nama" value="${c.name || ''}">

    <textarea id="ca" class="input" placeholder="Alamat">${c.address || ''}</textarea>
    <textarea id="ct" class="input" placeholder="Catatan">${c.notes || ''}</textarea>
    <button class="btn primary" onclick="saveCustomer('${c.id || ''}')">Simpan</button>
  </div>`);
}

async function saveCustomer(id) {
  const name = $('#cn').value.trim();
  const phone = $('#cp').value.trim();
  const address = $('#ca').value.trim();
  const notes = $('#ct').value.trim();

  if (!name) return toast('Nama pelanggan tidak boleh kosong');

  await Services.customers.save({
    id: id || null,
    name,
    phone,
    address,
    notes
  });
  closeModal();
  render();
  toast('Pelanggan berhasil disimpan');
}

    return toast('Tambahkan pelanggan terlebih dahulu di menu Pelanggan.');
  }
  openModal(`<h2>Tambah Piutang</h2>
  <div class="form">
    <select id="rc" class="input">
      ${cs.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
    </select>
    <input id="ri" class="input" placeholder="No Invoice" value="INV-${Date.now().toString().slice(-5)}">
    <input id="rt" type="date" class="input" value="${today()}">
    <input id="rd" type="date" class="input" value="${today()}">
    <input id="ra" type="number" class="input" placeholder="Nominal">
    <textarea id="rx" class="input" placeholder="Keterangan"></textarea>
    <input id="rf" type="file" class="input" accept="image/*">
    <button class="btn primary" onclick="saveReceivable()">Simpan Piutang</button>
  </div>`);
}

async function fileBase64(input) {
  const f = input.files[0];
  if (!f) return '';
  return await new Promise(res => {
    const img = new Image();
    const fr = new FileReader();
    fr.onload = () => {
      img.onload = () => {
        const c = document.createElement('canvas');
        const m = 900;
        const scale = Math.min(1, m / img.width);
        c.width = img.width * scale;
        c.height = img.height * scale;
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        res(c.toDataURL('image/jpeg', .72));
      };
      img.src = fr.result;
    };
    fr.readAsDataURL(f);
  });
}

async function saveReceivable() {
  const customerId = $('#rc').value;
  const invoiceNo = $('#ri').value.trim();
  const transDate = $('#rt').value;
  const dueDate = $('#rd').value;
  const amount = Number($('#ra').value);
  const desc = $('#rx').value;
  const fileInput = $('#rf');

  if (!customerId) return toast('Pilih pelanggan terlebih dahulu');
  if (!invoiceNo) return toast('Nomor invoice tidak boleh kosong');
  if (!transDate) return toast('Pilih tanggal transaksi');
  if (!dueDate) return toast('Pilih tanggal jatuh tempo');
  if (isNaN(amount) || amount <= 0) return toast('Nominal harus lebih besar dari 0');

  // Check unique invoice
  const exist = one('SELECT id FROM receivables WHERE invoice_no=?', [invoiceNo]);
  if (exist) return toast('Nomor invoice sudah digunakan');

  let attachment = '';
  if (fileInput.files.length > 0) {
    attachment = await fileBase64(fileInput);
  }

  await Services.receivables.save({
    customer_id: customerId,
    invoice_no: invoiceNo,
    transaction_date: transDate,
    due_date: dueDate,
    principal_amount: amount,
    description: desc,
    attachment_base64: attachment
  });
  closeModal();
  render();
  toast('Piutang berhasil disimpan');
}

function paymentForm() {
  const rs = Services.receivables.list('all').filter(r => r.remaining_amount > 0);
  if (rs.length === 0) {
    return toast('Tidak ada piutang aktif yang perlu dibayar.');
  }
  openModal(`<h2>Catat Pembayaran</h2>
  <div class="form">
    <select id="pr" class="input">
      ${rs.map(r => `<option value="${r.id}">${r.invoice_no} · ${r.customer_name} · ${rupiah(r.remaining_amount)}</option>`).join('')}
    </select>
    <input id="pd" type="date" class="input" value="${today()}">
    <input id="pa" type="number" class="input" placeholder="Nominal dibayar">
    <textarea id="pn" class="input" placeholder="Keterangan"></textarea>
    <button class="btn primary" onclick="savePayment()">Simpan Pembayaran</button>
  </div>`);
}

async function savePayment() {
  const receivableId = $('#pr').value;
  const payDate = $('#pd').value;
  const amount = Number($('#pa').value);
  const note = $('#pn').value;

  if (!receivableId) return toast('Pilih invoice terlebih dahulu');
  if (!payDate) return toast('Pilih tanggal pembayaran');
  if (isNaN(amount) || amount <= 0) return toast('Nominal pembayaran harus lebih besar dari 0');

  // Check remaining amount
  const rec = one('SELECT remaining_amount, invoice_no FROM receivables WHERE id=?', [receivableId]);
  if (!rec) return toast('Piutang tidak ditemukan');
  if (amount > rec.remaining_amount) {
    return toast(`Nominal pembayaran melebihi sisa piutang (${rupiah(rec.remaining_amount)})`);
  }

  await Services.payments.save({
    receivable_id: receivableId,
    payment_date: payDate,
    amount: amount,
    note: note
  });
  closeModal();
  render();
  toast('Pembayaran berhasil disimpan');
}

function userForm() {
  openModal(`<h2>Tambah Pengguna</h2>
  <div class="form">
    <input id="un" class="input" placeholder="Nama">
    <input id="ue" class="input" placeholder="Email">
    <input id="up" class="input" placeholder="Password" type="password">
    <select id="ur" class="input">
      <option value="admin">Admin</option>
      <option value="finance">Staf Keuangan</option>
      <option value="owner">Pemilik Usaha</option>

async function saveUser() {
  const name = $('#un').value.trim();
  const email = $('#ue').value.trim();
  const password = $('#up').value;
  const role = $('#ur').value;

  if (!name) return toast('Nama tidak boleh kosong');
  if (!email) return toast('Email tidak boleh kosong');
  if (!password) return toast('Password tidak boleh kosong');

  // Check unique email
  const exist = one('SELECT id FROM profiles WHERE email=?', [email]);
  if (exist) return toast('Email sudah terdaftar');

  await Services.users.save({ name, email, password, role });
  closeModal();
  render();
  toast('Pengguna berhasil disimpan');
}

async function deleteUser(id) {
  if (confirm('Apakah Anda yakin ingin menghapus pengguna ini?')) {
    await Services.users.remove(id);
    render();
    toast('Pengguna berhasil dihapus');
  }
}

function exportDb() {
  const a = document.createElement('a');
  const blob = new Blob([db.export()], { type: 'application/octet-stream' });
  a.href = URL.createObjectURL(blob);
  a.download = 'piutangku-backup.sqlite';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function importDb(e) {
  const f = e.target.files[0];
  if (!f) return;
  try {
    const buf = await f.arrayBuffer();
    const tempDb = new SQL.Database(new Uint8Array(buf));
    tempDb.run("PRAGMA foreign_keys=ON;");
    db = tempDb;
    schema();
    await persist();
    render();
    toast('Data berhasil dipulihkan');
  } catch (err) {
    console.error(err);
    toast('Gagal memulihkan data: Format berkas tidak valid.');
  }
}

function render() {
  if (!session) return renderLogin();
  location.hash = currentRoute;
  appBody.innerHTML = { dashboard, customers, receivables, reports, settings }[currentRoute]?.() || dashboard();
  if (currentRoute === 'dashboard') {
    setTimeout(() => {
      const s = Services.report.summary();
      if (chart) chart.destroy();

      const chartData = (s.paid === 0 && s.remaining === 0)
        ? { data: [1], labels: ['Belum ada data'], colors: ['#cbd5e1'] }
        : { data: [s.paid, s.remaining], labels: ['Terbayar', 'Sisa'], colors: ['#16a34a', '#2563eb'] };

      chart = new Chart($('#chart'), {
        type: 'doughnut',
        data: {
          labels: chartData.labels,
          datasets: [{
            data: chartData.data,
            backgroundColor: chartData.colors,
            borderWidth: 0
          }]
        },
        options: {
          plugins: {
            legend: {
              position: 'bottom'
            }
          },
          cutout: '68%'
        }
      });
    }, 0);
  }
}

async function boot() {
  try {
    SQL = await initSqlJs({ locateFile: file => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/' + file });
    let bytes = null;
    try {
      bytes = await idbGet();
    } catch (e) {
      const b = localStorage.getItem('piutangku_sqlite_b64');
      if (b) bytes = Uint8Array.from(atob(b), c => c.charCodeAt(0));
      fallback = true;
    }
    db = bytes ? new SQL.Database(bytes) : new SQL.Database();
    schema();
    seed();

    // Auto-update all receivable statuses to overdue if due date has passed
    db.run(`UPDATE receivables SET status = CASE
      WHEN remaining_amount <= 0 THEN 'paid'
      WHEN remaining_amount = principal_amount THEN
        CASE WHEN date(due_date) < date('now', 'localtime') THEN 'overdue' ELSE 'unpaid' END
      ELSE
        CASE WHEN date(due_date) < date('now', 'localtime') THEN 'overdue' ELSE 'partial' END
    END`);

    await persist();
    Services.auth.restore();
    currentRoute = location.hash.replace('#', '') || 'dashboard';
    render();
    if (fallback) toast('IndexedDB tidak tersedia. Aplikasi memakai fallback lokal sementara.');
  } catch (e) {
    fallback = true;
    console.error(e);
    alert('SQLite WASM gagal dimuat. Jalankan file ini dengan internet aktif atau host yang melayani sql.js.');
  }
}

window.addEventListener('hashchange', () => {
  currentRoute = location.hash.replace('#', '') || 'dashboard';
  render();
});
boot();
</script></body></html>
